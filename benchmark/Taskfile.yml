version: "3"

vars:
  SITE_DIR: ../site
  REPORTS_DIR: reports
  QUARTO_DIR: quarto
  DATA_DIR: data
  PORT: 4321

tasks:

  default:
    desc: "Show available tasks"
    cmds:
      - task --list

  # ── Setup ─────────────────────────────────────────────────────────────────

  setup:r-deps:
    desc: "Install required R packages (DBI, duckdb, ggplot2, knitr, kableExtra, ggforce)"
    cmds:
      - >
        Rscript -e '
          pkgs <- c("DBI","duckdb","ggplot2","knitr","kableExtra","ggforce","tibble","ggrepel");
          missing <- pkgs[!pkgs %in% installed.packages()[,"Package"]];
          if (length(missing)) install.packages(missing, repos="https://cran.r-project.org")
          else cat("All R packages already installed.\n")
        '

  setup:node-deps:
    desc: "Install Node.js dependencies (pa11y-ci, lighthouse, serve) globally"
    dir: "{{.SITE_DIR}}"
    cmds:
      - npm install

  setup:
    desc: "Install all dependencies (R packages + Node.js)"
    cmds:
      - task: setup:r-deps
      - task: setup:node-deps

  # ── Data ──────────────────────────────────────────────────────────────────

  fetch:
    desc: "Scrape menus from aquavena.nc (Python)"
    dir: ..
    cmds:
      - uv run python scripts/fetch_data.py

  # ── Site build ────────────────────────────────────────────────────────────

  build:
    desc: "Build the Astro static site"
    dir: "{{.SITE_DIR}}"
    cmds:
      - npm run build

  # ── Accessibility audits ──────────────────────────────────────────────────

  audit:pa11y:
    desc: "Run pa11y-ci WCAG 2.1 AA audit on local site → reports/pa11y.json"
    dir: "{{.SITE_DIR}}"
    cmds:
      - mkdir -p ../benchmark/{{.REPORTS_DIR}}
      - npx serve dist -p {{.PORT}} &
      - sleep 3
      - npx pa11y-ci --config .pa11yci.json --json > ../benchmark/{{.REPORTS_DIR}}/pa11y.json 2>/dev/null || true
      - kill %1 2>/dev/null || true

  audit:lighthouse:our-site:
    desc: "Lighthouse accessibility audit on our site → reports/lighthouse.report.json"
    dir: "{{.SITE_DIR}}"
    cmds:
      - mkdir -p ../benchmark/{{.REPORTS_DIR}}
      - npx serve dist -p {{.PORT}} &
      - sleep 3
      - >
        npx lighthouse "http://localhost:{{.PORT}}/#aqua-m%C3%A9diterran%C3%A9en"
        --only-categories=accessibility
        --output=json,html
        --output-path="../benchmark/{{.REPORTS_DIR}}/lighthouse"
        --chrome-flags="--no-sandbox --headless"
        --quiet
      - kill %1 2>/dev/null || true

  audit:lighthouse:aquavena-nc:
    desc: "Lighthouse accessibility audit on aquavena.nc → reports/lighthouse-aquavena-nc.report.json"
    dir: "{{.SITE_DIR}}"
    cmds:
      - mkdir -p ../benchmark/{{.REPORTS_DIR}}
      - >
        npx lighthouse "https://www.aquavena.nc/formules/aqua-m%C3%A9diterran%C3%A9en"
        --only-categories=accessibility
        --output=json
        --output-path="../benchmark/{{.REPORTS_DIR}}/lighthouse-aquavena-nc.report.json"
        --chrome-flags="--no-sandbox --headless"
        --quiet

  audit:
    desc: "Run all audits (pa11y + Lighthouse our-site + Lighthouse aquavena.nc)"
    cmds:
      - task: audit:pa11y
      - task: audit:lighthouse:our-site
      - task: audit:lighthouse:aquavena-nc

  # ── DuckDB + Report ───────────────────────────────────────────────────────

  db:clean:
    desc: "Delete DuckDB database (forces full rebuild on next report)"
    cmds:
      - rm -f {{.DATA_DIR}}/benchmark.duckdb

  db:
    desc: "Load JSONs into DuckDB (via Quarto render — R code)"
    cmds:
      - task: report

  score-history:
    desc: "Extract per-release Lighthouse scores from git tags + DuckDB → data/score_history.json"
    cmds:
      - uv run python scripts/extract_score_history.py

  diagram:db:
    desc: "Generate DB schema diagram from DuckDB via SchemaCrawler + Graphviz → quarto/db-schema.png"
    cmds:
      - >
        schemacrawler
        --url="jdbc:duckdb:{{.DATA_DIR}}/benchmark.duckdb"
        --info-level=standard
        --command=schema
        --output-format=dot
        --output-file={{.QUARTO_DIR}}/db-schema.dot
      - dot -Tpng -Gdpi=150 {{.QUARTO_DIR}}/db-schema.dot -o {{.QUARTO_DIR}}/db-schema.png

  report:
    desc: "Render the Quarto PDF report (loads JSONs → DuckDB → PDF via XeLaTeX)"
    dir: "{{.QUARTO_DIR}}"
    cmds:
      - quarto render report.qmd --to pdf

  report:fresh:
    desc: "Delete DuckDB, render once to build DB, regenerate diagram, re-render PDF with new diagram"
    cmds:
      - task: db:clean
      - task: report        # first pass: creates DuckDB + initial PDF
      - task: diagram:db    # regenerate schema PNG from the fresh DB
      - task: report        # second pass: embed updated diagram in final PDF
      - task: score-history

  # ── Full pipeline ─────────────────────────────────────────────────────────

  ci:
    desc: "CI pipeline: build → audit → report (no fetch; sets CI=true for ci_runs tracking)"
    env:
      CI: "true"
    cmds:
      - task: build
      - task: audit
      - task: report:fresh

  all:
    desc: "Full pipeline: fetch → build → audit → report (fresh DB)"
    cmds:
      - task: fetch
      - task: build
      - task: audit
      - task: report:fresh

  all:no-fetch:
    desc: "Pipeline without data fetch: build → audit → report (fresh DB)"
    cmds:
      - task: build
      - task: audit
      - task: report:fresh

  # ── Utilities ─────────────────────────────────────────────────────────────

  clean:reports:
    desc: "Delete generated reports (pa11y.json, lighthouse*.json, *.html)"
    cmds:
      - rm -f {{.REPORTS_DIR}}/pa11y.json
      - rm -f {{.REPORTS_DIR}}/lighthouse*.json
      - rm -f {{.REPORTS_DIR}}/lighthouse*.html

  clean:db:
    desc: "Delete DuckDB database"
    cmds:
      - rm -f {{.DATA_DIR}}/benchmark.duckdb

  clean:pdf:
    desc: "Delete generated PDF report"
    cmds:
      - rm -f {{.QUARTO_DIR}}/report.pdf

  clean:
    desc: "Delete all generated files (reports + db + pdf)"
    cmds:
      - task: clean:reports
      - task: clean:db
      - task: clean:pdf
