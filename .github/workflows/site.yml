name: Generate & Deploy Site

on:
  schedule:
    - cron: '0 19 * * *'   # 06:00 Nouvelle-Calédonie (UTC+11)
  push:
    branches: [main]
    paths-ignore:
      - 'tests/**'
      - 'src/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Fetch menu data
        run: uv run python scripts/fetch_data.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Astro deps
        run: npm install
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
